# LLM / TTS provider metadata — PRD §7.5.6.
# 현재 미배선 스펙(provider가 base_url/timeout을 아직 하드코딩). 키는 .env(OPENAI_API_KEY 등)에서, 여기엔 비밀 없음.

providers:
  openai:
    base_url: https://api.openai.com/v1
    timeout_sec: 60
    max_retries: 3
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
    timeout_sec: 60
    max_retries: 3
  openrouter:
    base_url: https://openrouter.ai/api/v1
    timeout_sec: 60
    max_retries: 3
  tts_openai:
    base_url: https://api.openai.com/v1
    default_voice: alloy
  tts_elevenlabs:
    base_url: https://api.elevenlabs.io/v1
    default_voice: rachel
