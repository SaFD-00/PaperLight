# LLM agent routing + generation hyperparameters — PRD §7.5.4/§7.5.5.
# Loaded by paperlight.providers.router. 각 agent를 OpenRouter Qwen3.6 패밀리(plus/flash/35b-a3b)로
# 라우팅하고 reasoning_effort(none|low|medium|high)·temperature·top_p·max_tokens를 함께 배선.
# 미지정 항목은 default에서 상속. (provider base_url/timeout은 provider 코드에 하드코딩.)
# 주의: reasoning_effort != none 이면 temperature/top_p는 전송하지 않음(thinking 모델이 무시/거부).
#       → 해당 agent의 temperature 값은 향후 effort=none 전환 시에만 적용되는 스펙값.
version: "2026.06.03"

default:
  provider: openrouter
  model: qwen/qwen3.6-35b-a3b
  reasoning_effort: medium
  temperature: 0.3
  top_p: 0.9
  max_tokens: 2048

agents:
  summary:
    provider: openrouter
    model: qwen/qwen3.6-35b-a3b
    reasoning_effort: medium
    temperature: 0.2
    max_tokens: 3000
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-plus }

  chat:
    provider: openrouter
    model: qwen/qwen3.6-35b-a3b
    reasoning_effort: medium
    temperature: 0.4
    max_tokens: 2048
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-plus }

  explanation:
    provider: openrouter
    model: qwen/qwen3.6-35b-a3b
    reasoning_effort: medium
    temperature: 0.2
    max_tokens: 1500
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-flash }

  translation:
    provider: openrouter
    model: qwen/qwen3.6-flash
    reasoning_effort: none
    temperature: 0.1
    max_tokens: 4000
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-35b-a3b }

  figure_description:        # F-14 — vision (qwen3.6-plus 멀티모달)
    provider: openrouter
    model: qwen/qwen3.6-plus
    reasoning_effort: medium
    temperature: 0.2
    max_tokens: 1500
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-35b-a3b }

  table_description:         # F-14 — vision
    provider: openrouter
    model: qwen/qwen3.6-plus
    reasoning_effort: medium
    temperature: 0.2
    max_tokens: 1500
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-35b-a3b }

  paragraph_description:     # F-15 — batch, cheap
    provider: openrouter
    model: qwen/qwen3.6-flash
    reasoning_effort: none
    temperature: 0.2
    max_tokens: 400

  paragraph_importance:      # F-15 — classifier
    provider: openrouter
    model: qwen/qwen3.6-flash
    reasoning_effort: none
    temperature: 0.1          # Qwen 권장: non-thinking에서도 greedy(0.0) 회피
    max_tokens: 100

  podcast_outline:
    provider: openrouter
    model: qwen/qwen3.6-plus
    reasoning_effort: high
    temperature: 0.6
    max_tokens: 2000
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-35b-a3b }

  podcast_script:
    provider: openrouter
    model: qwen/qwen3.6-plus
    reasoning_effort: high
    temperature: 0.7
    max_tokens: 8000
    fallback:
      - { provider: openrouter, model: qwen/qwen3.6-35b-a3b }

  podcast_critique:
    provider: openrouter
    model: qwen/qwen3.6-35b-a3b
    reasoning_effort: medium
    temperature: 0.3
    max_tokens: 1500

  critique:
    provider: openrouter
    model: qwen/qwen3.6-35b-a3b
    reasoning_effort: medium
    temperature: 0.3
    max_tokens: 1500

  classifier:
    provider: openrouter
    model: qwen/qwen3.6-flash
    reasoning_effort: none
    temperature: 0.1          # Qwen 권장: non-thinking에서도 greedy(0.0) 회피
    max_tokens: 100

  highlight:
    provider: openrouter
    model: qwen/qwen3.6-flash
    reasoning_effort: low
    temperature: 0.2
    max_tokens: 1000

  domain_classifier:         # 논문 도메인 분류 (글로서리 선택용)
    provider: openrouter
    model: qwen/qwen3.6-flash
    reasoning_effort: none
    temperature: 0.1          # Qwen 권장: non-thinking에서도 greedy(0.0) 회피
    max_tokens: 100

# 아래 섹션은 라우터 미사용(보존). embedding은 ingestion.embedder가 담당.
embedding:
  provider: openai
  model: text-embedding-3-large
  fallback:
    - { provider: local, model: bge-m3 }   # DAU 5k 이후 self-host

reranker:
  provider: local
  model: bge-reranker-v2-m3
  fallback:
    - { provider: cohere, model: rerank-multilingual-v3.0 }

tts:
  default_provider: openai
  providers:
    openai:
      model: tts-1-hd
      voice_a: alloy
      voice_b: echo
    elevenlabs:                # 한국어 품질 부족 시 fallback
      voice_a_id_env: ELEVENLABS_VOICE_A_ID
      voice_b_id_env: ELEVENLABS_VOICE_B_ID
      model: eleven_multilingual_v2
