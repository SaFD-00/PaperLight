services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paperlight
      POSTGRES_PASSWORD: paperlight
      POSTGRES_DB: paperlight
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperlight"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: paperlight
      MINIO_ROOT_PASSWORD: paperlight
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  minio_data:
